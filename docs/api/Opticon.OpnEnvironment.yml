  source:
    id: DebugMode
    path: C:\OPN2001\CSP2\Windows\M3188 .Net Wrapper\source\Csp2.net\Opticon.csp2.net\OpnEnvironment.cs
    startLine: 108
  assemblies:
  - Opticon.csp2
  namespace: Opticon
  summary: Sets the debug mode of the underlying CSP2 library.
  remarks: >-
    Requires a debug build of <code>csp2.dll</code>.


    <ul><li><xref href="Opticon.OpnEnvironment.OpnDebugMode.Off" data-throw-if-not-resolved="false"></xref>: Debugging disabled.</li><li><xref href="Opticon.OpnEnvironment.OpnDebugMode.Basic" data-throw-if-not-resolved="false"></xref>: Enables basic debug output.</li><li><xref href="Opticon.OpnEnvironment.OpnDebugMode.Verbose" data-throw-if-not-resolved="false"></xref>: Enables all debug output.</li></ul>
  example: []
  syntax:
    content: public static OpnEnvironment.OpnDebugMode DebugMode { set; }
    parameters: []
    return:
      type: Opticon.OpnEnvironment.OpnDebugMode
      description: The desired debug mode.
    content.vb: Public Shared WriteOnly Property DebugMode As OpnEnvironment.OpnDebugMode
  overload: Opticon.OpnEnvironment.DebugMode*
  exceptions:
  - type: Opticon.OpnException
    commentId: T:Opticon.OpnException
    description: Thrown when the underlying CSP2 call fails.
