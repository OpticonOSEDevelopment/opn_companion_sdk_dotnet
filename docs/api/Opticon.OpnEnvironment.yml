  source:
    id: RetryCount
    path: C:\OPN2001\CSP2\Windows\M3188 .Net Wrapper\source\Csp2.net\Opticon.csp2.net\OpnEnvironment.cs
    startLine: 58
  assemblies:
  - Opticon.csp2
  namespace: Opticon
  summary: Gets or sets the number of retry attempts used by the underlying CSP2 communication layer.
  remarks: >-
    This setting controls how many times the library will retry a failed communication attempt

    before returning an error. Increasing this value may improve reliability in unstable

    connections but can also increase latency.
  example: []
  syntax:
    content: public static int RetryCount { get; set; }
    parameters: []
    return:
      type: System.Int32
    content.vb: Public Shared Property RetryCount As Integer
  overload: Opticon.OpnEnvironment.RetryCount*
  exceptions:
  - type: Opticon.OpnException
    commentId: T:Opticon.OpnException
    description: Thrown when the underlying CSP2 call fails.
